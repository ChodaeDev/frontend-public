server:
  port: 8080

spring:
  application:
    name: chodae-recovery-api
  
  # MariaDB Database 설정
  # 옵션 1: 로컬 MariaDB 사용 (로컬에 MariaDB 설치되어 있을 때)
  # 옵션 2: Docker MariaDB 사용 (docker-compose up으로 MariaDB 실행 시)
  #        - 로컬 MariaDB가 3306 포트를 사용 중이면 충돌할 수 있음
  #        - Docker MariaDB는 docker-compose.yml에서 3306:3306으로 포트 매핑됨
  datasource:
    url: jdbc:mariadb://localhost:3306/chodae_recovery?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    driver-class-name: org.mariadb.jdbc.Driver
    username: user
    password: pass
  
  # SQL 초기화 설정
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
  
  # MyBatis 설정
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.chodae.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
  
  # Jackson 설정
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# JWT 설정
jwt:
  secret: chodaeRecoverySecretKey2024ForJWTTokenGeneration
  expiration: 86400000 # 24시간

# 로깅 설정
logging:
  level:
    root: INFO
    com.chodae: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web: DEBUG
    org.springframework.security.web.access: DEBUG
    org.springframework.security.web.FilterChainProxy: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.filter: DEBUG
    # MyBatis SQL 로깅
    com.chodae.mapper: DEBUG
    org.mybatis: DEBUG
    org.apache.ibatis: DEBUG
    java.sql: DEBUG
    java.sql.Statement: DEBUG
    java.sql.PreparedStatement: DEBUG
    java.sql.ResultSet: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
