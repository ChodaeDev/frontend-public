server:
  port: 8080

spring:
  application:
    name: chodae-recovery-api
  
  # H2 Database 설정 (Docker 환경용)
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false  # Docker에서는 로그를 줄이기 위해 false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  
  # Jackson 설정
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# JWT 설정
jwt:
  secret: chodaeRecoverySecretKey2024ForJWTTokenGeneration
  expiration: 86400000 # 24시간

# 로깅 설정 (Docker 환경용)
logging:
  level:
    com.chodae: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: /app/logs/application.log
