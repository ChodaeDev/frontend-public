server:
  port: 8080

spring:
  application:
    name: chodae-recovery-api
  
  # MariaDB Database 설정 (Docker 환경용)
  datasource:
    url: jdbc:mariadb://db:3306/chodae_recovery?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    driver-class-name: org.mariadb.jdbc.Driver
    username: user
    password: pass
  
  # SQL 초기화 설정
  sql:
    init:
      # Docker(외부 DB)에서는 앱 재기동 때마다 schema.sql(DROP 등) 실행되면 데이터가 초기화됩니다.
      # 스키마/초기 데이터는 MariaDB 컨테이너의 /docker-entrypoint-initdb.d 를 이용해 "최초 1회만" 실행하는 것을 권장합니다.
      mode: never
      schema-locations: classpath:schema.sql
  
  # JPA 설정 (VisitorCount용)
  jpa:
    hibernate:
      ddl-auto: none  # MyBatis 사용하므로 JPA DDL 비활성화
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MariaDBDialect
  
  # Jackson 설정
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# JWT 설정
jwt:
  secret: chodaeRecoverySecretKey2024ForJWTTokenGeneration
  expiration: 86400000 # 24시간

# 로깅 설정 (Docker 환경용)
logging:
  level:
    com.chodae: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: /app/logs/application.log
